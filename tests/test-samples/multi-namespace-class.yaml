apiVersion: nerc.mghpcc.org/v1alpha1
kind: Class
metadata:
  name: multi-test-class
  namespace: default
spec:
  classCode: "CS202"
  semester: "Spring2026"
  displayName: "Multi-Namespace Test Class"
  professors:
    - "professor@university.edu"

  # Multi-namespace deployment - creates namespace per user
  deployment:
    multiNamespace: true
    namespaceTemplate: "cs202-{{.Username}}"
    studentNamespacePrefix: "cs202-"

  # OpenShift group containing students
  studentsGroup: "students"

  resourceQuota:
    cpu: "2"
    memory: "4Gi"
    pods: "5"

  notebookCulling:
    enabled: true
    cutoff: 3600

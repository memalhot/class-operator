apiVersion: nerc.mghpcc.org/v1alpha1
kind: Class
metadata:
  name: cs210-class
  namespace: default
spec:
  classCode: "CS210"
  semester: "Spring2026"
  displayName: "Computer Science 210"
  professors:
    - "professor@university.edu"

  # Single namespace deployment - all students share rhods-notebooks namespace
  deployment:
    multiNamespace: false
    namespaceTemplate: "rhods-notebooks"

  # OpenShift group containing students
  studentsGroup: "cs210"

  notebookCulling:
    enabled: true
    cutoff: 600

apiVersion: apps/v1
kind: Deployment
metadata:
  name: class-operator-controller-manager
  namespace: class-operator-system
  labels:
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: class-operator-controller-manager
      containers:
      - name: manager
        image: class-operator:latest
        imagePullPolicy: Always
        command:
        - /manager
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
